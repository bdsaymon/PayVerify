name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Unzip Project
      run: |
        unzip PayVerify_Android_Project_Final.zip
        ls -la
        ls -la PayVerify/

    - name: Create gradlew
      run: |
        cd PayVerify
        gradle wrapper --gradle-version 8.2

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Grant execute permission
      run: |
        cd PayVerify
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd PayVerify
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: PayVerify-APK
        path: PayVerify/app/build/outputs/apk/debug/app-debug.apk
