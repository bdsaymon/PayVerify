name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Unzip Project
      run: |
        unzip -o PayVerify_Android_Project_Final.zip
        ls -la PayVerify/

    - name: Setup Gradle Wrapper
      run: |
        cd PayVerify
        gradle wrapper --gradle-version=8.2
        chmod +x gradlew

    - name: Build APK
      run: |
        cd PayVerify
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PayVerify-APK
        path: PayVerify/app/build/outputs/apk/debug/*.apk
        retention-days: 30
